name: CI ARM Matrix

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-tests-arm64:
    name: Native tests (ARM64 Linux)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run unit/integration tests
        run: cargo test

      - name: Run stress ignored tests
        run: cargo test --test stress -- --ignored

  cross-check-arm:
    name: Cross-check ARM targets (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ARM targets
        run: |
          rustup target add aarch64-unknown-linux-gnu
          rustup target add aarch64-unknown-linux-musl
          rustup target add armv7-unknown-linux-gnueabihf
          rustup target add aarch64-apple-darwin
          rustup target add aarch64-linux-android

      - name: Check ARM targets
        run: |
          cargo check --target aarch64-unknown-linux-gnu
          cargo check --target aarch64-unknown-linux-musl
          cargo check --target armv7-unknown-linux-gnueabihf
          cargo check --target aarch64-apple-darwin
          cargo check --target aarch64-linux-android

      - name: Check ARM test build targets
        run: |
          cargo check --tests --target aarch64-unknown-linux-gnu
          cargo check --tests --target aarch64-unknown-linux-musl
          cargo check --tests --target armv7-unknown-linux-gnueabihf
          cargo check --tests --target aarch64-apple-darwin
          cargo check --tests --target aarch64-linux-android
