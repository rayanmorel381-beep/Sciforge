name: server-ci

on:
  push:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            server -> target

      - name: Cargo check
        run: cargo check --workspace
        working-directory: server

      - name: Cargo test
        run: cargo test --workspace --exclude api-gateway --exclude realtime-gateway
        working-directory: server

      - name: Cargo test realtime-gateway
        run: cargo test -p realtime-gateway
        working-directory: server

      - name: Cargo test api-gateway
        run: cargo test -p api-gateway -- --skip e2e_register_link_create_server_and_realtime
        working-directory: server
